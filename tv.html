<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <title>Beam TV — Empfänger</title>
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
  <style>
    :root {
      --bg: #000;
      --bg-elev: #111;
      --bg-card: #1a1a1a;
      --line: rgba(255,255,255,0.1);
      --line-strong: rgba(255,255,255,0.2);
      --text: #f5f1ea;
      --text-dim: #b3aea4;
      --text-faint: #6b665e;
      --accent: #ff6b35;
      --accent-soft: rgba(255,107,53,0.15);
      --accent-glow: rgba(255,107,53,0.45);
      --warn: #f5b342;
      --serif: Georgia, "Times New Roman", serif;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 24px;
      line-height: 1.4;
      width: 100%;
      height: 100%;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .stage {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4vw;
      position: relative;
    }

    .pair-card {
      background: var(--bg-card);
      border: 2px solid var(--line);
      border-radius: 32px;
      padding: 5vh 6vw;
      max-width: 1600px;
      width: 100%;
      text-align: center;
    }
    .pair-grid {
      display: flex;
      flex-direction: column;
      gap: 28px;
      align-items: center;
    }
    .pair-col { display: flex; flex-direction: column; align-items: center; gap: 22px; }
    /* Landscape (typischer TV): QR links, Code+Eingabe rechts. */
    @media (min-aspect-ratio: 1/1) and (min-width: 800px) {
      .pair-card { padding: 4vh 5vw; }
      .pair-grid {
        flex-direction: row;
        align-items: center;
        justify-content: center;
        gap: 6vw;
      }
      .pair-col { align-items: center; }
      .qr-canvas { width: 38vmin !important; height: 38vmin !important; }
      h1 { font-size: clamp(36px, 4vw, 60px); margin-bottom: 14px; }
      .lede { font-size: clamp(16px, 1.4vw, 22px); margin-bottom: 24px; }
      .brand { margin-bottom: 18px; }
      .or-divider { margin: 4px 0 16px; }
      .code-input-wrap { margin-bottom: 20px; }
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 32px;
    }
    .brand-dot {
      width: 12px; height: 12px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 16px var(--accent-glow);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.55; transform: scale(0.85); }
    }

    h1 {
      font-family: var(--serif);
      font-style: italic;
      font-weight: 400;
      font-size: clamp(36px, 5vw, 72px);
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 22px;
    }
    h1 em { color: var(--accent); }
    .lede {
      font-size: clamp(18px, 1.7vw, 26px);
      color: var(--text-dim);
      max-width: 760px;
      margin: 0 auto 32px;
    }

    .qr-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      margin-bottom: 36px;
    }
    .qr-canvas {
      background: #fff;
      border-radius: 18px;
      padding: 18px;
      width: clamp(220px, 28vw, 340px);
      height: clamp(220px, 28vw, 340px);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .qr-canvas svg, .qr-canvas img { width: 100%; height: 100%; display: block; }
    .qr-caption {
      font-size: clamp(16px, 1.4vw, 22px);
      color: var(--text-dim);
    }
    .qr-caption strong { color: var(--text); font-weight: 600; }
    .tv-code-pill {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      background: var(--bg-elev);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px 22px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: clamp(20px, 2vw, 30px);
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--accent);
    }
    .tv-code-pill .label {
      font-family: var(--sans);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-faint);
      font-weight: 500;
      letter-spacing: 0.18em;
    }

    .or-divider {
      text-align: center;
      font-size: 13px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-faint);
      margin: 8px 0 24px;
      position: relative;
    }
    .or-divider::before, .or-divider::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 30%;
      height: 1px;
      background: var(--line);
    }
    .or-divider::before { left: 0; }
    .or-divider::after { right: 0; }
    .manual-section { display: flex; flex-direction: column; align-items: center; gap: 18px; }
    .manual-label {
      font-size: clamp(13px, 1vw, 17px);
      color: var(--text-faint);
      letter-spacing: 0.05em;
    }

    .code-input-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 32px;
    }
    .code-input {
      background: var(--bg-elev);
      border: 2px solid var(--line-strong);
      border-radius: 18px;
      padding: 18px 28px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: clamp(28px, 3vw, 44px);
      font-weight: 700;
      letter-spacing: 0.25em;
      text-align: center;
      color: var(--accent);
      width: clamp(280px, 50vw, 540px);
      text-transform: uppercase;
      outline: none;
      transition: border-color 0.2s;
    }
    .code-input:focus { border-color: var(--accent); }
    .code-input::placeholder { color: var(--text-faint); letter-spacing: 0.05em; font-weight: 400; }

    .pair-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 18px;
      padding: 20px 56px;
      font-family: var(--sans);
      font-size: clamp(18px, 1.8vw, 26px);
      font-weight: 700;
      letter-spacing: -0.01em;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 6px 30px var(--accent-glow);
    }
    .pair-btn:focus { outline: 3px solid #fff; outline-offset: 4px; }
    .pair-btn:active { transform: scale(0.97); }
    .pair-btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }

    .hint {
      margin-top: 36px;
      font-size: clamp(14px, 1.2vw, 18px);
      color: var(--text-faint);
    }

    .status {
      margin-top: 28px;
      font-size: clamp(16px, 1.4vw, 22px);
      color: var(--text-dim);
      min-height: 1.2em;
    }
    .status.ok { color: var(--accent); }
    .status.err { color: var(--warn); }

    .player {
      position: fixed;
      inset: 0;
      background: #000;
      display: none;
      z-index: 10;
    }
    .player.active { display: block; }
    .player video {
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
      object-fit: contain;
    }

    .player-overlay {
      position: absolute;
      left: 0; right: 0; top: 0;
      padding: 24px 32px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
      color: var(--text);
      font-size: 18px;
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.3s;
      z-index: 11;
    }
    .player-overlay.hide { opacity: 0; }
    .player-overlay-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .player-overlay-dot {
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 12px var(--accent-glow);
      animation: pulse 1.6s ease-in-out infinite;
    }
    .player-overlay-name {
      font-family: var(--serif);
      font-style: italic;
      font-size: 22px;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .player-overlay-stat {
      font-family: ui-monospace, monospace;
      font-size: 14px;
      color: var(--text-dim);
    }

    .loading {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: var(--text);
    }
    .loading-spinner {
      width: 64px; height: 64px;
      border: 4px solid var(--line);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-size: 22px;
      color: var(--text-dim);
    }
    .loading-progress {
      margin-top: 16px;
      font-family: ui-monospace, monospace;
      font-size: 16px;
      color: var(--text-faint);
    }

    .footer-tag {
      padding: 18px 4vw;
      text-align: center;
      font-size: 14px;
      color: var(--text-faint);
      letter-spacing: 0.1em;
    }
    .footer-tag em { font-family: var(--serif); font-style: italic; color: var(--text-dim); }
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="pair-card" id="pairCard">
      <div class="brand">
        <span class="brand-dot"></span>
        <span>Beam · TV · v19</span>
      </div>
      <h1>Mit dem <em>iPhone</em> verbinden.</h1>
      <p class="lede">QR-Code mit der iPhone-Kamera scannen — Beam öffnet sich automatisch mit diesem TV verbunden.</p>

      <div class="pair-grid">
        <div class="pair-col" id="qrBlock">
          <div class="qr-canvas" id="tvQr"></div>
          <div class="qr-caption">Mit der <strong>Kamera-App</strong> oder Safari scannen</div>
        </div>
        <div class="pair-col">
          <div class="tv-code-pill">
            <span class="label">Code</span>
            <span id="tvCode">…</span>
          </div>
          <div class="or-divider">oder Code manuell eingeben</div>
          <div class="manual-section">
            <div class="code-input-wrap">
              <input type="text" class="code-input" id="codeInput" placeholder="ABCDEF" maxlength="6" autocomplete="off" autocapitalize="characters" spellcheck="false" inputmode="text" />
            </div>
            <button class="pair-btn" id="pairBtn" disabled>Verbinden</button>
          </div>
        </div>
      </div>
      <div class="status" id="status"></div>
    </div>
  </div>

  <div class="player" id="player">
    <div id="videoMount"></div>
    <div class="player-overlay" id="overlay">
      <div class="player-overlay-row">
        <div class="player-overlay-dot"></div>
        <div class="player-overlay-name" id="overlayName">Beam</div>
        <div class="player-overlay-stat" id="overlayStat"></div>
      </div>
    </div>
    <div class="loading" id="loading">
      <div class="loading-spinner"></div>
      <div class="loading-text" id="loadingText">Lade Metadaten…</div>
      <div class="loading-progress" id="loadingProgress"></div>
    </div>
  </div>

  <div class="footer-tag">
    <em>Beam — empfängt vom iPhone via WebTorrent</em>
  </div>

  <script>
    'use strict';

    const codeInput = document.getElementById('codeInput');
    const pairBtn = document.getElementById('pairBtn');
    const status = document.getElementById('status');
    const stage = document.getElementById('stage');
    const player = document.getElementById('player');
    const videoMount = document.getElementById('videoMount');
    const overlay = document.getElementById('overlay');
    const overlayName = document.getElementById('overlayName');
    const overlayStat = document.getElementById('overlayStat');
    const loading = document.getElementById('loading');
    const loadingText = document.getElementById('loadingText');
    const loadingProgress = document.getElementById('loadingProgress');
    const tvQr = document.getElementById('tvQr');
    const tvCode = document.getElementById('tvCode');
    const qrBlock = document.getElementById('qrBlock');

    function setStatus(msg, kind = '') {
      status.textContent = msg || '';
      status.classList.remove('ok', 'err');
      if (kind) status.classList.add(kind);
    }

    function formatBytes(b) {
      if (b == null || isNaN(b)) return '–';
      const u = ['B', 'KB', 'MB', 'GB', 'TB'];
      let i = 0; let n = Number(b);
      while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; }
      return n.toFixed(n >= 100 ? 0 : n >= 10 ? 1 : 2) + ' ' + u[i];
    }

    // Code normalisieren (nur Großbuchstaben/Zahlen, max. 6)
    codeInput.addEventListener('input', () => {
      const cleaned = codeInput.value.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 6);
      if (cleaned !== codeInput.value) codeInput.value = cleaned;
      pairBtn.disabled = cleaned.length !== 6;
    });
    codeInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !pairBtn.disabled) pairBtn.click();
    });

    function genCode(len = 6) {
      const alphabet = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let s = '';
      const r = new Uint8Array(len);
      crypto.getRandomValues(r);
      for (let i = 0; i < len; i++) s += alphabet[r[i] % alphabet.length];
      return s;
    }

    function getSenderUrl(code) {
      const u = new URL('./', window.location.href);
      return u.toString().replace(/index\.html$/, '') + '?code=' + code;
    }

    function showQr(code) {
      const url = getSenderUrl(code);
      try {
        const qr = window.qrcode(0, 'M');
        qr.addData(url);
        qr.make();
        tvQr.innerHTML = qr.createSvgTag({ cellSize: 6, margin: 2, scalable: true });
      } catch (e) {
        tvQr.textContent = 'QR-Fehler';
      }
      tvCode.textContent = code.match(/.{1,3}/g).join(' ');
    }

    // Code aus URL übernehmen (?code=ABCDEF) — Manuell-Modus, vom iPhone vorgegeben
    const urlCode = (new URLSearchParams(window.location.search).get('code') || '').toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 6);
    let activeCode = '';
    if (urlCode.length === 6) {
      // Code vom iPhone vorgegeben (?code=)
      qrBlock.style.display = 'none';
      codeInput.value = urlCode;
      pairBtn.disabled = false;
      activeCode = urlCode;
      setTimeout(() => connect(urlCode), 400);
    } else {
      // QR-Modus: TV erzeugt Code und zeigt QR
      activeCode = genCode();
      showQr(activeCode);
      setTimeout(() => connect(activeCode), 100);
    }

    pairBtn.addEventListener('click', () => connect(codeInput.value));

    const scriptCache = new Map();
    function loadScript(src) {
      if (scriptCache.has(src)) return scriptCache.get(src);
      const p = new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = src;
        s.onload = resolve;
        s.onerror = () => reject(new Error('Konnte ' + src + ' nicht laden'));
        document.head.appendChild(s);
      });
      scriptCache.set(src, p);
      return p;
    }

    function withTimeout(promise, ms, label) {
      return new Promise((resolve, reject) => {
        const t = setTimeout(() => reject(new Error('Timeout nach ' + ms + ' ms: ' + label)), ms);
        promise.then((v) => { clearTimeout(t); resolve(v); },
                     (e) => { clearTimeout(t); reject(e); });
      });
    }

    let webTorrentLoadPromise = null;
    function loadWebTorrent(progress) {
      if (window.WebTorrent) return Promise.resolve();
      if (webTorrentLoadPromise) return webTorrentLoadPromise;
      const sources = [
        { name: 'jsdelivr', fn: async () => { await loadScript('https://cdn.jsdelivr.net/npm/webtorrent@1.9.7/webtorrent.min.js'); } },
        { name: 'unpkg',    fn: async () => { await loadScript('https://unpkg.com/webtorrent@1.9.7/webtorrent.min.js'); } },
        { name: 'esm.sh',   fn: async () => {
          const m = await import('https://esm.sh/webtorrent@2.4.1?bundle');
          window.WebTorrent = m.default || m.WebTorrent;
        } },
      ];
      webTorrentLoadPromise = (async () => {
        let lastErr;
        for (let i = 0; i < sources.length; i++) {
          const { name, fn } = sources[i];
          if (progress) progress('WebTorrent via ' + name + ' (' + (i + 1) + '/' + sources.length + ')…');
          try {
            await withTimeout(fn(), 10000, 'WebTorrent ' + name);
            if (typeof window.WebTorrent === 'function') return;
          } catch (e) { lastErr = e; }
        }
        throw new Error('WebTorrent konnte nicht geladen werden' + (lastErr ? ': ' + lastErr.message : ''));
      })();
      return webTorrentLoadPromise;
    }

    // Pairing über MQTT-over-WebSocket auf EMQX' öffentlichem Broker.
    // iPhone publiziert Magnet mit retain=true → Broker hält die Nachricht,
    // wir bekommen sie sofort beim Subscribe (auch wenn iPhone vor uns gestartet hat).
    let mqttLoadPromise = null;
    function loadMqtt(progress) {
      if (window.mqtt) return Promise.resolve();
      if (mqttLoadPromise) return mqttLoadPromise;
      const sources = [
        { name: 'jsdelivr', fn: async () => { await loadScript('https://cdn.jsdelivr.net/npm/mqtt@5.10.4/dist/mqtt.min.js'); } },
        { name: 'unpkg',    fn: async () => { await loadScript('https://unpkg.com/mqtt@5.10.4/dist/mqtt.min.js'); } },
      ];
      mqttLoadPromise = (async () => {
        let lastErr;
        for (let i = 0; i < sources.length; i++) {
          const { name, fn } = sources[i];
          if (progress) progress('mqtt.js via ' + name + ' (' + (i + 1) + '/' + sources.length + ')…');
          try {
            await withTimeout(fn(), 10000, 'mqtt.js ' + name);
            if (window.mqtt && typeof window.mqtt.connect === 'function') return;
          } catch (e) { lastErr = e; }
        }
        throw new Error('mqtt.js konnte nicht geladen werden' + (lastErr ? ': ' + lastErr.message : ''));
      })();
      return mqttLoadPromise;
    }


    let session = null;
    let reportStatus = () => {};

    function disconnectSession() {
      if (!session) return;
      try { session.client && session.client.destroy(); } catch {}
      try { session.mqttClient && session.mqttClient.end(true); } catch {}
      session = null;
    }

    async function connect(code) {
      // Falls schon eine Session läuft (z. B. QR-Auto + manueller Override),
      // erst sauber abbauen, dann neu verbinden.
      disconnectSession();
      pairBtn.disabled = true;
      setStatus('Lade WebTorrent & MQTT…');
      try {
        await Promise.all([
          loadWebTorrent((s) => setStatus('Lade ' + s)),
          loadMqtt((s) => setStatus('Lade ' + s)),
        ]);
      } catch (e) {
        setStatus(e.message || 'Bibliotheken konnten nicht geladen werden.', 'err');
        pairBtn.disabled = false;
        return;
      }

      setStatus('Bereit als Code ' + code + ' — verbinde zu Pairing-Broker…', 'ok');

      const mqttUrl = 'wss://broker.emqx.io:8084/mqtt';
      const magnetTopic = 'beam/' + code.toLowerCase() + '/magnet';
      const tvStatusTopic = 'beam/' + code.toLowerCase() + '/tvstatus';
      const clientId = 'beam-tv-' + Math.random().toString(36).slice(2, 10);

      let gotMagnet = false;
      let mqttConnected = false;
      let messageCount = 0;

      const mqttClient = window.mqtt.connect(mqttUrl, {
        clientId,
        clean: true,
        connectTimeout: 10000,
        reconnectPeriod: 3000,
      });
      session = { client: null, torrent: null, mqttClient };

      // Status zurück ans iPhone — sparsam, nur bei echten Phasen-Änderungen.
      function publishStatus(state, detail) {
        if (!mqttConnected) return;
        const payload = JSON.stringify({ state, detail, ts: Date.now() });
        // retain=true, damit ein iPhone das nach uns subscribed direkt erfährt
        mqttClient.publish(tvStatusTopic, payload, { qos: 1, retain: true });
      }
      reportStatus = publishStatus;

      mqttClient.on('connect', () => {
        mqttConnected = true;
        setStatus('Bereit als Code ' + code + ' — MQTT-Kanal offen, warte auf iPhone.', 'ok');
        // Subscribe auf Magnet-Topic. Falls iPhone retain=true gesetzt hat
        // (was es tut), bekommen wir die letzte Nachricht sofort.
        mqttClient.subscribe(magnetTopic, { qos: 1 });
        // Einmal "subscribed" mitteilen, retained, damit iPhone weiß dass TV da ist
        publishStatus('subscribed');
      });

      mqttClient.on('error', (err) => {
        if (!gotMagnet) setStatus('MQTT-Fehler: ' + (err && err.message || err), 'err');
      });

      mqttClient.on('close', () => {
        mqttConnected = false;
      });

      mqttClient.on('message', (topic, payload) => {
        if (topic !== magnetTopic) return;
        messageCount++;
        const text = payload.toString();
        if (!text) return; // leere Payload = retained-clear
        try {
          const meta = JSON.parse(text);
          if (!meta || !meta.magnet || gotMagnet) return;
          // Replay-Schutz: zu alte Magnete (>10 min) ignorieren
          if (meta.ts && Date.now() - meta.ts > 10 * 60 * 1000) {
            setStatus('Veralteten Magnet ignoriert (älter als 10 min) — sende erneut vom iPhone.', 'err');
            return;
          }
          gotMagnet = true;
          setStatus('Magnet erhalten — starte Stream…', 'ok');
          startTorrent(meta);
        } catch {}
      });

      // Hinweis nach 60 s
      setTimeout(() => {
        if (!gotMagnet && session && session.mqttClient === mqttClient) {
          const parts = [];
          parts.push('MQTT ' + (mqttConnected ? 'verbunden' : 'getrennt'));
          parts.push(messageCount + ' Messages');
          setStatus('Kein Magnet in 60 s [' + parts.join(', ') + ']. iPhone Cast für Code ' + code + ' gestartet?', 'err');
          pairBtn.disabled = false;
        }
      }, 60000);

      function startTorrent(meta) {
        stage.style.display = 'none';
        player.classList.add('active');
        overlayName.textContent = meta.name || 'Stream';
        loadingText.textContent = 'Lade Metadaten…';
        loadingProgress.textContent = '';

        const client = new window.WebTorrent();
        session.client = client;

        const opts = {
          announce: [
            'wss://tracker.openwebtorrent.com',
            'wss://tracker.btorrent.xyz',
            'wss://tracker.webtorrent.dev',
          ],
        };

        client.on('error', (err) => {
          loadingText.textContent = 'WebTorrent-Fehler';
          loadingProgress.textContent = String(err.message || err);
          reportStatus('error', String(err.message || err));
        });

        client.add(meta.magnet, opts, (torrent) => {
          session.torrent = torrent;
          reportStatus('metadata');
          loadingText.textContent = 'Puffert…';
          // Größte Datei wählen (üblicherweise das Video)
          const file = torrent.files.reduce((a, b) => (b.length > a.length ? b : a), torrent.files[0]);
          // Video-Element erzeugen und streamen
          videoMount.innerHTML = '';
          const v = document.createElement('video');
          v.controls = true;
          v.autoplay = true;
          v.playsInline = true;
          v.preload = 'auto';
          videoMount.appendChild(v);
          // renderTo nutzt render-media — entscheidet je nach Format
          // zwischen MediaSource-Streaming und Blob-URL-Fallback.
          file.renderTo(v, { autoplay: true, controls: true });

          v.addEventListener('canplay', () => {
            loading.style.display = 'none';
            reportStatus('playing');
            tryFullscreen();
            requestWakeLock();
          });
          v.addEventListener('waiting', () => { reportStatus('buffering'); });
          v.addEventListener('playing', () => { reportStatus('playing'); });
          v.addEventListener('error', () => {
            const code = v.error ? v.error.code : 0;
            loadingText.textContent = 'Wiedergabefehler';
            loadingProgress.textContent = 'Code ' + code + ' — Codec evtl. nicht unterstützt.';
            reportStatus('error', 'video error code ' + code);
          });

          // Overlay nach kurzer Zeit ausblenden
          let overlayTimer;
          const showOverlay = () => {
            overlay.classList.remove('hide');
            clearTimeout(overlayTimer);
            overlayTimer = setTimeout(() => overlay.classList.add('hide'), 4000);
          };
          showOverlay();
          v.addEventListener('mousemove', showOverlay);
          v.addEventListener('click', showOverlay);
          v.addEventListener('keydown', showOverlay);
          window.addEventListener('keydown', showOverlay);

          torrent.on('download', () => {
            const pct = Math.round(torrent.progress * 100);
            const dn = formatBytes(torrent.downloadSpeed) + '/s';
            overlayStat.textContent = pct + '% · ↓ ' + dn;
            if (loading.style.display !== 'none') {
              loadingProgress.textContent = formatBytes(torrent.downloaded) + ' / ' + formatBytes(file.length) + ' · ↓ ' + dn;
            }
          });
          torrent.on('done', () => {
            overlayStat.textContent = 'vollständig geladen';
          });
        });
      }
    }

    function tryFullscreen() {
      const el = document.documentElement;
      const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
      if (req) {
        try { req.call(el); } catch {}
      }
    }

    let wakeLock = null;
    async function requestWakeLock() {
      if (!('wakeLock' in navigator)) return;
      try {
        wakeLock = await navigator.wakeLock.request('screen');
        wakeLock.addEventListener('release', () => { wakeLock = null; });
      } catch {}
    }

    window.addEventListener('beforeunload', () => {
      try { session && session.client && session.client.destroy(); } catch {}
      try { session && session.room && session.room.leave && session.room.leave(); } catch {}
    });
  </script>
</body>
</html>
